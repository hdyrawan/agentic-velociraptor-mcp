# Curated Velociraptor artifact catalog
#
# This is the single reviewed registry of every Velociraptor artifact
# name that any profiles/*.yaml file is allowed to reference. It is an
# AUTHORING-TIME and TEST-TIME control, NOT a runtime permission path:
#
#   - It does NOT grant collection. Whether an artifact may actually run
#     is still gated exclusively by policy.allowed_artifacts at runtime
#     (see internal/policy and internal/dfir/validate.go). Adding an
#     entry here never widens or bypasses that allowlist.
#   - Its job is to guarantee every profile artifact is a known, reviewed,
#     exact name (never a wildcard/prefix/pattern, never agent-supplied)
#     carrying recorded OS / category / risk / sensitivity / verification
#     metadata. internal/dfir.ValidateProfileAgainstCatalog and the dfir
#     tests enforce that profiles reference only names present here.
#
# Metadata fields (all required except notes):
#   name              exact Velociraptor artifact name
#   target_os         windows | linux | macos | any
#   category          loose grouping (inventory, process, network, ...)
#   risk_level        low | medium | high  (operational risk / data volume)
#   requires_approval advisory: should profiles containing it be approval-gated
#   sensitivity       short privacy/impact label
#   verified          true if confirmed present in a real Velociraptor
#                     catalog; false = candidate/illustrative, not
#                     production-ready without confirming against the
#                     target deployment's own catalog
#   notes             reviewer context
#
# "verified: true" entries below were confirmed against a real
# Velociraptor lab server (image wlambert/velociraptor, 433-artifact
# catalog) on 2026-07-07 via `velociraptor artifacts list`. "verified:
# false" entries are pre-existing illustrative names carried by the
# original v0.4.0-v0.7.0 profiles; each notes the nearest real artifact.

