name: windows_execution_evidence
display_name: "Windows Execution Evidence"
description: >
  Program-execution artifacts: Prefetch, Amcache, ShimCache/AppCompatCache, and BAM.
target_os: windows
category: execution
risk_level: medium
requires_approval: false
max_runtime_seconds: 600
max_result_rows: 5000
max_result_bytes: 10485760
artifacts:
  - name: Windows.Forensics.Prefetch
  - name: Windows.Forensics.Amcache
  - name: Windows.Registry.AppCompatCache
  - name: Windows.Forensics.Bam
