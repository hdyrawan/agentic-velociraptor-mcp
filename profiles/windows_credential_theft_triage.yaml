# DFIR profile: windows_credential_theft_triage
#
# Identify accounts or credentials potentially compromised on a Windows system, 
# such as evidence of LSASS dumping or Mimikatz-style activity.
# Artifacts are marked as illustrative unless verified against the production server.
name: windows_credential_theft_triage
display_name: "Windows Credential Theft Triage"
description: >
  Detect indicators of credential theft (e.g., LSASS dumping, Mimikatz activity) on Windows systems.
target_os: windows
category: credential-theft
risk_level: high
requires_approval: true
max_runtime_seconds: 300
max_result_rows: 1000
max_result_bytes: 5242880
artifacts:
  - name: Windows.System.CredentialTheft
