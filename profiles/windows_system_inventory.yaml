# DFIR profile: windows_system_inventory
#
# Curated bundle of reviewed, catalog-verified Velociraptor artifacts.
# Every artifact below is present in catalog/artifacts.yaml and must also
# be added to policy.allowed_artifacts before this profile can be used.
# Definition only: adding this file adds no collection/hunt/VQL logic.
name: windows_system_inventory
display_name: "Windows System Inventory"
description: >
  Baseline Windows host inventory: identity, local users, installed programs, drivers, interfaces, and services.
target_os: windows
category: inventory
risk_level: low
requires_approval: false
max_runtime_seconds: 600
max_result_rows: 5000
max_result_bytes: 10485760
artifacts:
  - name: Generic.Client.Info
  - name: Windows.Sys.Users
  - name: Windows.Sys.Programs
  - name: Windows.Sys.Drivers
  - name: Windows.Sys.Interfaces
  - name: Windows.System.Services
