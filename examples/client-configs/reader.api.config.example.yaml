# Illustrative shape of a Velociraptor api.config.yaml, as generated by
# a Velociraptor administrator via:
#
#   velociraptor --config server.config.yaml config api_client \
#     --name "agentic-velociraptor-mcp-reader" \
#     reader.api.config.yaml
#
# This is NOT a real, usable config — the certificate/key values below
# are placeholders, not real PEM data. Never commit a real generated
# api.config.yaml to version control: it contains a real private key.
#
# Once you have a real one from your Velociraptor administrator:
#   1. Save it outside version control, e.g. /etc/agentic-velociraptor-mcp/.
#   2. chmod 0600 it (internal/velociraptor.LoadAPIConfig enforces this
#      on POSIX platforms and will refuse to read a more permissive file).
#   3. Point config.read-only.example.yaml's velociraptor.read_api_config_path
#      at it.
#
# See ../../docs/configuration.md's "The read API config file" section
# and ../../docs/velociraptor-permissions.md for what role/ACLs this
# identity should (and must not) have.

ca_certificate: |
  -----BEGIN CERTIFICATE-----
  PLACEHOLDER-NOT-A-REAL-CERTIFICATE
  -----END CERTIFICATE-----
client_cert: |
  -----BEGIN CERTIFICATE-----
  PLACEHOLDER-NOT-A-REAL-CERTIFICATE
  -----END CERTIFICATE-----
client_private_key: |
  -----BEGIN RSA PRIVATE KEY-----
  PLACEHOLDER-NOT-A-REAL-PRIVATE-KEY
  -----END RSA PRIVATE KEY-----
api_connection_string: velociraptor.example.internal:8001
name: agentic-velociraptor-mcp-reader
# pinned_server_name: VelociraptorServer   # optional; this is the default
