# Production read-only posture — the recommended starting point for any
# real deployment, and the posture to fall back to in an emergency (see
# docs/runbooks/rollback.md).
#
# In this posture only the 14 read-only tools do anything; every
# approval-gated write tool reports itself disabled regardless of the
# rest of this file. There is no write API identity configured at all,
# so even a bug in this server could not reach a write-capable
# Velociraptor ACL.
#
# PLACEHOLDERS: every value written as /path/to/... MUST be replaced
# before use. This file itself contains no secrets and must never be
# edited to contain any — the only secret material lives in the
# separate api.config.yaml file referenced below, which stays outside
# version control with mode 0600 (enforced at load time, not just
# recommended).
#
# Field reference: docs/configuration.md. Identity guidance:
# docs/velociraptor-permissions.md. For a zero-setup mock-mode config
# (no Velociraptor server at all), use
# examples/client-configs/config.read-only.example.yaml instead.

server:
  name: agentic-velociraptor-mcp
  transport: stdio            # the only supported transport; never expose a port

velociraptor:
  org_id: root
  # SECRET FILE (not a secret value): path to the least-privilege READER
  # identity's api.config.yaml (mTLS bundle generated by a Velociraptor
  # administrator — see docs/velociraptor-permissions.md). chmod 0600.
  # Leave "" to run in mock mode with no Velociraptor connection.
  read_api_config_path: /path/to/reader.api.config.yaml
  # No write identity in the read-only posture. Leave empty.
  write_api_config_path: ""
  timeout_seconds: 30
  max_rows: 500               # hard cap on rows per tool call
  max_result_bytes: 1048576   # 1 MiB serialized-result cap per call
  max_upload_bytes: 52428800  # 50 MiB cap; unused while download_dir is empty
  # Evidence download stays disabled: empty download_dir turns
  # velo_download_flow_upload_with_approval off outright.
  download_dir: ""

policy:
  mode: read_only             # every write-capable tool refuses to run
  allow_raw_vql: false        # must stay false; config validation rejects true
  allow_list_all_artifacts: false
  allow_target_all: false
  max_hunt_clients: 25        # inert in read_only mode, kept small anyway
  require_approval_for:       # keep the full set even in read_only mode
    - collect_artifact
    - collect_dfir_profile
    - start_hunt
    - start_dfir_hunt
    - cancel_flow
    - cancel_hunt
    - download_flow_upload
    - hunt_ioc
  # Review every entry against YOUR deployment before use. In read_only
  # mode these bound what velo_list_artifact_names/profile tools will
  # describe; nothing here can be collected until mode is controlled.
  allowed_artifacts:
    - Generic.Client.Info
    - Windows.System.Pslist
    - Windows.Network.Netstat
    - Linux.Sys.Pslist
    - Linux.Network.Netstat
  allowed_profiles:
    - windows_basic_triage
    - linux_basic_triage

audit:
  enabled: true               # required in every real deployment
  # Directory must exist, be writable by the service account only, and
  # sit on storage with retention appropriate for investigation records.
  # The file is written 0600. See docs/runbooks/approval-and-audit.md.
  path: /var/log/agentic-velociraptor-mcp/audit.jsonl
  max_size_bytes: 104857600   # rotate at 100 MiB
  max_files: 10               # retain ~1 GiB of audit history
  redact_fields:              # additive to the hard-coded redaction list
    - client_private_key
    - client_cert
    - ca_certificate
    - api_key
    - approval_token
    - password
    - secret

approval:
  # Empty store_path keeps every approval-gated tool disabled — the
  # second, independent switch (alongside policy.mode) that must be
  # deliberately set before the write pilot activates.
  store_path: ""
  ttl_seconds: 900
